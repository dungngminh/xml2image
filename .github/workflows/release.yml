name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    types:
      - labeled
  issues:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to release, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }} lite artifact
    runs-on: ${{ matrix.os }}
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (
        (github.event_name == 'pull_request' || github.event_name == 'issues') &&
        github.event.label.name == 'release'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            command: gradle packageLiteTar
            artifact: build/distributions/*.tar.gz
          - name: Windows
            os: windows-latest
            command: gradle packageLiteZip
            artifact: build/distributions/*.zip
          - name: macOS
            os: macos-latest
            command: ./package-dmg-lite.sh
            artifact: build/jpackage/output/*-lite-*.dmg

    steps:
      - name: Checkout tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Checkout source
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build lite artifact
        shell: bash
        run: ${{ matrix.command }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p build/release
          cp ${{ matrix.artifact }} build/release/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xml2image-${{ matrix.name }}
          path: build/release/*
          if-no-files-found: error

  publish:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: XML2Image ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: release-assets/*
