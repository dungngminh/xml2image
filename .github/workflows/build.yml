name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Verify ${{ matrix.name }} package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            command: gradle packageLiteTar
            artifact: build/distributions/*.tar.gz
          - name: Windows
            os: windows-latest
            command: gradle packageLiteZip
            artifact: build/distributions/*.zip
          - name: macOS
            os: macos-latest
            command: ./package-dmg-lite.sh
            artifact: build/jpackage/output/*-lite-*.dmg

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build package
        shell: bash
        run: ${{ matrix.command }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: xml2image-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
